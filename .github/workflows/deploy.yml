name: Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify project files
        run: |
          echo "Verifying HTML files..."
          test -f index.html && echo "✓ index.html found" || echo "✗ index.html NOT found"
          test -f carrito.html && echo "✓ carrito.html found" || echo "✗ carrito.html NOT found"
          test -f servicios.html && echo "✓ servicios.html found" || echo "✗ servicios.html NOT found"
          test -f horarios.html && echo "✓ horarios.html found" || echo "✗ horarios.html NOT found"
          
          echo ""
          echo "Verifying CSS files..."
          test -f css/style.css && echo "✓ style.css found" || echo "✗ style.css NOT found"
          test -f css/carrito.css && echo "✓ carrito.css found" || echo "✗ carrito.css NOT found"
          
          echo ""
          echo "Verifying JavaScript files..."
          test -f js/app.js && echo "✓ app.js found" || echo "✗ app.js NOT found"
          test -f js/compras.js && echo "✓ compras.js found" || echo "✗ compras.js NOT found"

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        env:
          VERCEL_ENV: production

      - name: Success notification
        if: success()
        run: echo "✓ Deployment to Vercel completed successfully!"

      - name: Failure notification
        if: failure()
        run: echo "✗ Deployment failed. Check logs above for details."
