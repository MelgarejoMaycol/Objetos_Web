<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPU3D EXPLORER - Menú de Productos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="./css/carrito.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" type="image/x-icon" href="./img/log.png">
</head>
<body>
    <!-- ========== MENÚ PRINCIPAL ========== -->
    <nav class="navbar">
        <!-- Logo -->
        <div class="navbar-logo">
            <img class="imgLogo" src="./img/log.png" alt="Logo COMPU3D">
        </div>

        <!-- Links de Navegación -->
        <div class="navbar-links">
            <a href="./index.html" class="nav-link">Inicio</a>
            <a href="#" class="nav-link">Servicios</a>
            <a href="./carrito.html" class="nav-link">Productos</a>
            <a href="#" class="nav-link">Horarios</a>
        </div>

        <!-- Redes Sociales -->
        <div class="navbar-social">
            <button class="social-btn"><img src="/img/facebook.png" alt="Facebook"></button>
            <button class="social-btn"><img src="/img/insta.png" alt="Instagram"></button>
            <button class="social-btn"><img src="/img/youtube.png" alt="YouTube"></button>
        </div>
    </nav>

    <!-- ========== CONTENEDOR DE PRODUCTOS ========== -->
    <div class="container">
        <div id="product-menu" class="product-menu">
            <!-- Los productos se cargarán aquí dinámicamente -->
        </div>
    </div>

    <!-- Icono del carrito -->
    <div id="cart-icon">
        <i class="fas fa-shopping-cart"></i>
        <span id="cart-count">0</span>
    </div>

    <!-- Carrito desplegable -->
    <div id="cart-dropdown">
        <h3>Carrito de Compras</h3>
        <div id="cart-items"></div>
        <p>Total: $<span id="cart-total">0</span></p>
        <button id="checkout" style="background-color: #00FFFF; color: black;">Realizar Pedido</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.js"></script>
    <script src="./js/compras.js"></script>
    <script type="module" src="./js/app.js"></script>
</body>
</html>
